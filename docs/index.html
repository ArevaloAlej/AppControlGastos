<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gastos en Pareja</title>

<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<link rel="stylesheet" href="./css/styles.css">

<header>
  <nav>
    <a href="#entrada">+ Registrar</a>
    <a href="#dashboard" id="nav-dashboard" class="hidden">Resumen</a>
  </nav>
  <div>
    <span id="nav-nombre"></span>
    <button id="btn-logout" type="button">Salir</button>
  </div>
</header>

<main>
  <section id="view-login" class="view hidden">
    <h2>Iniciar sesión</h2>
    <form id="form-login">
      <label for="login-usuario">Usuario</label>
      <select id="login-usuario" required></select>

      <label for="login-pin">PIN (4 dígitos)</label>
      <input id="login-pin" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required>

      <button type="submit">Entrar</button>
      <p id="login-error" style="color:#f87171"></p>
    </form>
  </section>

  <section id="view-entrada" class="view hidden">
    <h2>Nuevo registro</h2>
    <button id="btn-activar-recordatorios" type="button">Activar recordatorios</button>
    <form id="form-movimiento">
      <label for="mov-fecha">Fecha</label>
      <input id="mov-fecha" type="date" required>

      <div class="tipo-toggle">
        <label><input type="radio" name="tipo" value="gasto" checked> Gasto</label>
        <label><input type="radio" name="tipo" value="ingreso"> Ingreso</label>
      </div>

      <label for="mov-categoria">Categoría</label>
      <select id="mov-categoria" required></select>

      <label for="mov-monto">Monto (Bs)</label>
      <input id="mov-monto" type="number" step="0.01" min="0" required>

      <div id="mov-preview-usd"></div>

      <label for="mov-nota">Nota (opcional)</label>
      <input id="mov-nota" type="text">

      <button type="submit">Guardar</button>
    </form>
  </section>

  <section id="view-dashboard" class="view hidden">
    <h2>Resumen (admin)</h2>
    <table><tbody id="resumen-tabla"></tbody></table>

    <h2>Deudas</h2>
    <table><tbody id="deudas-tabla"></tbody></table>

    <h2>Movimientos</h2>
    <table><tbody id="movimientos-tabla"></tbody></table>
  </section>
</main>

<div id="toast" class="toast"></div>

<script src="./js/categories.js"></script>
<script src="./js/api.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/entry-form.js"></script>
<script src="./js/dashboard.js"></script>
<script src="./js/reminders.js"></script>
<script src="./js/app.js"></script>
